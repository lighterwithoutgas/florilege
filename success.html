<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<base href="/">
<script>
  const firebaseDomains = [
    "graduation-abd07.web.app",
    "graduation-abd07.firebaseapp.com"
  ];

  if (firebaseDomains.includes(window.location.hostname)) {
    const canonicalUrl = new URL(window.location.href);
    canonicalUrl.protocol = "https:";
    canonicalUrl.hostname = "getflorilege.com";
    canonicalUrl.port = "";

    window.location.replace(canonicalUrl.toString());
  }

  const bookId = new URLSearchParams(window.location.search).get("b");
  if (bookId && window.location.pathname.replace(/\/+$/, "") === "/success") {
    window.location.replace(`/s/${encodeURIComponent(bookId)}`);
  }
</script>
<title>Your Florilège book</title>
<meta name="robots" content="noindex">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="assets/theme.css">
<style>
  .wrap { width:min(720px,100%); text-align:center; }
  .flower { width:96px; margin:0 auto .4rem; }
  h1 { font-family:var(--serif); font-weight:600; font-size:2rem; margin:.2rem 0; }
  p.sub { font-family:var(--body); color:var(--ink-soft); }
  .links { font-family:var(--body); text-align:start; max-width:640px; margin:1.2rem auto; }
  .links .l { background:#fffdf7; border:1px solid var(--line); border-radius:6px; padding:.7rem .9rem; margin:.6rem 0; word-break:break-all; }
  .links .l b { font-family:var(--serif); color:var(--leaf-deep); display:block; font-style:italic; margin-bottom:.2rem; }
  .links .l .copy { float:right; font-family:var(--serif); font-size:.8rem; cursor:pointer; color:var(--gold-deep); border:none; background:none; }
  .keychip { display:inline-block; background:var(--blush); border-radius:6px; padding:.1em .5em; font-family:var(--serif); }
  .err { color:var(--carnation-2); font-family:var(--serif); font-style:italic; }
  .spin { font-family:var(--serif); font-style:italic; color:var(--ink-soft); }
  .save { max-width:640px; margin:1.2rem auto 0; text-align:center; padding:1.2rem; }
  .save h2 { font-family:var(--serif); font-weight:600; font-size:1.25rem; margin:.1rem 0 .3rem; }
  .save p { font-family:var(--body); color:var(--ink-soft); font-size:.95rem; margin:0 0 .9rem; }
  .save .note { font-family:var(--serif); font-style:italic; color:var(--leaf-deep); margin-top:.7rem; min-height:1.2em; }
</style>
</head>
<body>
<div class="stage">
  <div class="wrap">
    <div class="flower" id="flower"></div>
    <h1 id="title">Finishing your book…</h1>
    <p class="sub" id="sub"><span class="spin">Just a moment while we press the last page.</span></p>
    <div class="sheet card links" id="links" hidden></div>
    <div class="sheet card save" id="save" hidden>
      <h2>Keep this book for good</h2>
      <p>Save it to your account and you'll find it on any device — no need to hang onto this page or the email.</p>
      <button class="btn btn--gold" id="saveBtn" type="button">Save to my account with Google</button>
      <div class="note" id="saveNote"></div>
    </div>
    <div class="err" id="err"></div>
  </div>
</div>

<script type="module">
import { getBookId, startPetals } from './assets/theme.js';
import { flowerSVG } from './assets/flowers.js';
import { getBookConfig, ensureAnon, saveBookToAccount, isSignedInAccount } from './assets/firebase-init.js';

startPetals(8);
document.getElementById('flower').innerHTML = flowerSVG('tulip', { size:96 });

const bookId = getBookId();
const titleEl = document.getElementById('title');
const subEl   = document.getElementById('sub');
const linksEl = document.getElementById('links');
const errEl   = document.getElementById('err');

if (!bookId) {
  titleEl.textContent = 'Something went wrong';
  subEl.textContent = 'This link is missing its book id.';
} else {
  run();
}

async function run() {
  try { await ensureAnon(); } catch(e){}
  // the book is created and active the instant you confirm — poll briefly in
  // case the read races just ahead of the write.
  const deadline = Date.now() + 40000;
  let cfg = null;
  while (Date.now() < deadline) {
    try { cfg = await getBookConfig(bookId); } catch(e){ cfg = null; }
    if (cfg && cfg.status === 'active') return showLinks(cfg);
    await sleep(2000);
  }
  // still not showing — keep checking
  titleEl.textContent = 'Almost there…';
  subEl.innerHTML = "Your book is being finished. This page will keep checking — " +
    "or refresh in a minute.";
  keepTrying();
}

async function keepTrying() {
  while (true) {
    await sleep(4000);
    let cfg = null;
    try { cfg = await getBookConfig(bookId); } catch(e){}
    if (cfg && cfg.status === 'active') return showLinks(cfg);
  }
}

function showLinks(cfg) {
  const base = location.origin;
  const friendUrl = `${base}/a/${bookId}`;
  const bookUrl = `${base}/b/${bookId}`;
  const adminUrl = `${base}/m/${bookId}`;
  let key = '';
  try { key = localStorage.getItem('keepsake_key_'+bookId) || ''; } catch(_){}

  titleEl.textContent = `${cfg.recipientName}'s book is ready 🎉`;
  subEl.textContent = 'Two links — share each with the right people.';
  const keyLine = key
    ? `For the recipient — give them their key: <span class="keychip">${escapeHtml(key)}</span>`
    : 'For the recipient — plus the key you chose';

  linksEl.hidden = false;
  linksEl.innerHTML = `
    <div style="background:var(--blush);border:1px solid var(--carnation);border-radius:6px;padding:.75rem .9rem;margin:0 0 1rem;font-family:var(--serif);font-style:italic;color:var(--carnation-2);text-align:center;">📌 Save this page — it's the only copy of your links and key. Bookmark it or screenshot it now.</div>
    <div class="l"><button class="copy" data-c="${friendUrl}">copy</button><b>Share with friends (to add pages)</b>${friendUrl}</div>
    <div class="l"><button class="copy" data-c="${bookUrl}">copy</button><b>${keyLine}</b>${bookUrl}</div>
    ${cfg.hasManageKey ? `<div class="l"><button class="copy" data-c="${adminUrl}">copy</button><b>For you — remove pages (uses your management key)</b>${adminUrl}</div>` : ''}`;

  linksEl.querySelectorAll('.copy').forEach(b=>{
    b.addEventListener('click', ()=>{
      navigator.clipboard.writeText(b.dataset.c).then(()=>{ b.textContent='copied'; setTimeout(()=>b.textContent='copy',1500); });
    });
  });
  // keep the key in localStorage — it's hashed on the server and cannot be recovered,
  // so this is the only place the creator can look it up again.

  // the book's account card. Books are made while signed in, so it's usually
  // already saved — point them straight to their dashboard. (The anonymous-save
  // path is kept for any older book that isn't on an account yet.)
  const saveCard = document.getElementById('save');
  saveCard.hidden = false;
  if (isSignedInAccount()) {
    saveCard.querySelector('h2').textContent = 'Saved to your account';
    saveCard.querySelector('p').textContent =
      "This book is already in your account — open “My books” to find it on any device.";
    document.getElementById('saveBtn').textContent = 'Go to my books';
  }
}

const saveBtn = document.getElementById('saveBtn');
const saveNote = document.getElementById('saveNote');
saveBtn.addEventListener('click', async ()=>{
  // already on a real account → it's saved; just take them to the dashboard
  if (isSignedInAccount()) { location.href = '/my'; return; }
  saveBtn.disabled = true; saveNote.textContent = 'Opening Google…';
  try {
    await saveBookToAccount(bookId);
    saveNote.textContent = 'Saved! Taking you to your books…';
    location.href = '/my';
  } catch(e){
    const c = (e && e.code) || '';
    if (c === 'auth/popup-closed-by-user' || c === 'auth/cancelled-popup-request') {
      saveNote.textContent = ''; // they backed out — no harm
    } else {
      saveNote.textContent = "Couldn't save it just now — your links above still work.";
    }
    saveBtn.disabled = false;
  }
});

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>

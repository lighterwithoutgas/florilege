<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<base href="/">
<script>
  const firebaseDomains = [
    "graduation-abd07.web.app",
    "graduation-abd07.firebaseapp.com"
  ];

  if (firebaseDomains.includes(window.location.hostname)) {
    const canonicalUrl = new URL(window.location.href);
    canonicalUrl.protocol = "https:";
    canonicalUrl.hostname = "getflorilege.com";
    canonicalUrl.port = "";

    window.location.replace(canonicalUrl.toString());
  }
</script>
<title>A Florilège book</title>
<meta name="robots" content="noindex">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="assets/theme.css">
<style>
  .cover-name { line-height:1.35; margin:.2rem 0; padding:.45em .12em .45em; }
  .cover-major { font-family:var(--serif); font-style:italic; color:var(--leaf-deep); font-size:clamp(1rem,3vw,1.25rem); margin:.1rem 0 .2rem; }
  /* demo ribbon + make-your-own CTA */
  .demo-cta { position:fixed; left:14px; bottom:14px; z-index:50; display:flex; gap:.5rem; align-items:center;
    background:rgba(251,248,241,.9); backdrop-filter:blur(6px); border:1px solid var(--gold);
    border-radius:999px; padding:.35rem .4rem .35rem .9rem; box-shadow:var(--shadow-soft); }
  .demo-cta span { font-family:var(--serif); font-style:italic; color:var(--ink-soft); font-size:.92rem; }
  .demo-cta a { font-family:var(--serif); font-size:.95rem; text-decoration:none; padding:.35em 1em; border-radius:999px;
    background:linear-gradient(180deg, var(--gold-lite), var(--gold)); color:#4a3a12; border:1px solid var(--gold-deep); }
  .cover-name.latin { font-family:var(--serif); font-weight:600; font-size:clamp(3rem,12vw,5rem); color:var(--ink); }
  .cover-name.arabic { font-family:var(--calig); font-size:clamp(4rem,16vw,7rem); }
  .ded-reveal { font-size:clamp(2.6rem,10vw,5rem); line-height:1.35; margin:0 0 1.3rem; padding:.45em .12em .55em; clip-path:inset(-0.6em 100% -0.9em 0);
    background:linear-gradient(115deg,var(--gold-deep),var(--gold) 35%,var(--gold-lite) 50%,var(--gold) 65%,var(--gold-deep));
    -webkit-background-clip:text; background-clip:text; color:transparent; }
  .ded-reveal.latin { font-family:var(--serif); font-weight:600; }
  .ded-reveal.arabic { font-family:var(--calig); }
  .ded-reveal.run { animation:drawAr 2.2s ease forwards; }
  .plate .flowername { font-family:var(--serif); font-style:italic; color:var(--leaf-deep); font-size:clamp(1.3rem,4vw,1.9rem); margin:.6rem 0 .2rem; }
  /* then & now spread */
  .tn-row { display:flex; gap:clamp(1rem,4vw,2rem); justify-content:center; align-items:flex-start; flex-wrap:wrap; }
  .tn-card { display:flex; flex-direction:column; align-items:center; gap:.6rem; margin:0; }
  .tn-label { font-family:var(--serif); font-style:italic; text-transform:uppercase; letter-spacing:.3em; color:var(--gold-deep); font-size:.78rem; }
  .then .tn-row .polaroid { max-width:min(38vw,210px); margin:0; transform:rotate(-1.6deg); }
  .then .tn-row .tn-card:nth-child(2) .polaroid { transform:rotate(1.8deg); }
  .loading { text-align:center; font-family:var(--serif); font-style:italic; color:var(--ink-soft); }
</style>
</head>
<body>
<div class="controls right">
  <button class="ctl" id="musicBtn" type="button" hidden>♪ Music</button>
</div>

<!-- GATE -->
<div class="stage" id="gate">
  <div class="gate-wrap">
    <div class="flower" id="gateFlower"></div>
    <h1 id="gate-title">A Florilège book</h1>
    <p class="sub" id="gate-sub">This book was made for you. Enter the key you were given.</p>
    <div class="sheet gate-card">
      <div class="field" style="margin-bottom:.8rem;">
        <label for="keyInput">Your key</label>
        <input class="input" id="keyInput" type="password" autocomplete="current-password">
      </div>
      <div style="text-align:center; margin-top:1.2rem;">
        <button class="btn btn--gold" id="enterBtn" type="button">Open</button>
      </div>
      <div class="err" id="gateErr" style="color:var(--carnation-2);font-family:var(--serif);font-style:italic;min-height:1.2em;margin-top:.6rem;"></div>
    </div>
  </div>
</div>

<!-- BOOK -->
<div class="book-stage" id="bookStage" hidden>
  <button class="nav prev" id="prevBtn" aria-label="Previous">‹</button>
  <div class="book-frame">
    <div class="leaf" id="leaf"><div class="turn-shade" id="shade"></div><div class="leaf-inner" id="leafInner"></div></div>
    <div class="page-count" id="pageCount"></div>
  </div>
  <button class="nav next" id="nextBtn" aria-label="Next">›</button>
</div>

<script type="module">
import { getBookId, applyAccent, startPetals, toggleMusic, specimenPageHTML, wireVoice, escapeHTML } from './assets/theme.js';
import { flowerSVG, FLOWERS, FLOWER_LORE } from './assets/flowers.js';
import { emblemSVG } from './assets/majors.js';
import { getBookConfig, getPrivateContent, listenPages, redeemKeyAndSignIn, ensureAnon, watchAuth } from './assets/firebase-init.js';

// set the browser favicon to the major's emblem (each major gets its own)
function setFavicon(){
  if (!cfg || !cfg.major || !cfg.emblem) return; // each major gets its own favicon
  const uri = 'data:image/svg+xml,' + encodeURIComponent(emblemSVG(cfg.emblem, { color:'#C9A24B' }));
  let link = document.querySelector('link[rel="icon"]');
  if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.head.appendChild(link); }
  link.type = 'image/svg+xml'; link.href = uri;
}

const bookId = getBookId();
const isDemo = new URLSearchParams(location.search).get('demo') === '1' || bookId === 'demo';
let cfg = null, priv = {}, friends = [], pages = [], cur = 0, turning = false, musicOn = false, opened = false;

const gateErr = document.getElementById('gateErr');
const enterBtn = document.getElementById('enterBtn');
const keyInput = document.getElementById('keyInput');

if (isDemo) { queueMicrotask(openDemo); } // defer so the page-builder consts below are initialized
else if (!bookId) { document.getElementById('gate-sub').textContent = 'This link is missing its book id.'; enterBtn.disabled = true; }
else boot();

function openDemo(){
  startPetals(10);
  cfg = { recipientName:'Layan', nameScript:'arabic', flower:'lily', flowerColor:'#E58BB0', year:'2026',
          hasThen:false, major:'Pharmacy', coverSymbol:'flower', emblem:'mortar' };
  applyAccent(cfg.flowerColor);
  setFavicon();
  const childSvg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 240'>
    <rect width='200' height='240' fill='#F7E3EC'/>
    <circle cx='100' cy='172' r='66' fill='#E8C9A0'/>
    <circle cx='100' cy='106' r='48' fill='#F0D2AC'/>
    <path d='M52 96 q48 -42 96 0 q-10 -46 -48 -46 q-38 0 -48 46z' fill='#7a5a3a'/>
    <circle cx='84' cy='106' r='5' fill='#5b4a3a'/><circle cx='116' cy='106' r='5' fill='#5b4a3a'/>
    <path d='M86 124 q14 12 28 0' stroke='#b9748a' stroke-width='4' fill='none' stroke-linecap='round'/>
    <circle cx='72' cy='120' r='6' fill='#f2b5c8'/><circle cx='128' cy='120' r='6' fill='#f2b5c8'/>
  </svg>`;
  const gradSvg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 240'>
    <rect width='200' height='240' fill='#E7EFE4'/>
    <path d='M30 240 q70 -78 140 0 z' fill='#4F6A4C'/>
    <rect x='86' y='150' width='28' height='42' fill='#F0D2AC'/>
    <circle cx='100' cy='130' r='46' fill='#F0D2AC'/>
    <circle cx='86' cy='128' r='5' fill='#5b4a3a'/><circle cx='114' cy='128' r='5' fill='#5b4a3a'/>
    <path d='M86 146 q14 12 28 0' stroke='#b9748a' stroke-width='4' fill='none' stroke-linecap='round'/>
    <polygon points='100,62 156,84 100,106 44,84' fill='#2c281f'/>
    <rect x='74' y='80' width='52' height='16' rx='3' fill='#3A352C'/>
    <path d='M156 84 v30' stroke='#C9A24B' stroke-width='3'/>
    <circle cx='156' cy='116' r='5' fill='#C9A24B'/><circle cx='156' cy='84' r='4' fill='#C9A24B'/>
  </svg>`;
  priv = {
    dedication: 'For you — who stayed up for everyone else, and somehow still finished first.',
    plateNote: 'They say the lily means devotion. We pressed one here for yours.',
    closing: 'Wherever you go next, you carry all of us with you. Congratulations, graduate.',
    thenPhotoURL: 'data:image/svg+xml,' + encodeURIComponent(childSvg),
    thenCaption: 'Always the curious one',
    nowPhotoURL: 'data:image/svg+xml,' + encodeURIComponent(gradSvg),
    nowCaption: 'Class of 2026',
  };
  friends = [
    { name:'Sara',  message:'From the first lecture we sat through to the last all-nighter — I would do every minute again, just to have done it with you. So proud of you.' },
    { name:'Omar',  message:'You explained recursion to me four times without once making me feel slow. The world is lucky to get you next.' },
    { name:'Mama',  message:'I have watched you become exactly who I hoped, and someone even better than I imagined. My whole heart.' },
    { name:'Yusuf', message:'Congrats, doctor-in-the-making. Save me a seat at the top.' },
    { name:'Hana',  message:'You turned a group of strangers into a family. Thank you for every cup of tea and every pep talk at 2am.' },
  ];
  opened = true;
  document.getElementById('gate').hidden = true;
  document.getElementById('bookStage').hidden = false;
  document.getElementById('musicBtn').hidden = false;
  const cta = document.createElement('div');
  cta.className = 'demo-cta';
  cta.innerHTML = `<span>This is a sample</span><a href="create">Make your own ❦</a>`;
  document.body.appendChild(cta);
  const back = document.createElement('a');
  back.href = '/';
  back.className = 'ctl';
  back.textContent = '← Back to site';
  back.style.cssText = 'position:fixed; top:14px; left:14px; z-index:50; text-decoration:none;';
  document.body.appendChild(back);
  buildPages(); renderPage(true);
}

async function boot() {
  startPetals(10);
  try { await ensureAnon(); } catch(e){}
  try { cfg = await getBookConfig(bookId); } catch(e) { cfg = null; }
  if (!cfg) { document.getElementById('gate-sub').textContent = "We couldn't find this book."; enterBtn.disabled = true; return; }
  applyAccent(cfg.flowerColor);
  setFavicon();
  document.getElementById('gateFlower').innerHTML = motif(92) || flowerSVG('carnation', { size:92, color:cfg.flowerColor });
  document.getElementById('gate-title').textContent = `${cfg.recipientName}'s book`;
}

function authErr(e){
  const c=(e&&e.code)?e.code:'';
  if (c.includes('permission-denied')||c.includes('functions/permission-denied')) return "That key didn't work. Check it and try again.";
  if (c.includes('not-found')) return "We couldn't find this book.";
  if (c.includes('resource-exhausted')) return "Too many attempts — please wait a little and try again.";
  return "Couldn't open the book"+(c?` (${c})`:'')+".";
}
async function tryEnter() {
  const key = keyInput.value; if (!key) { gateErr.textContent='Type your key first.'; return; }
  enterBtn.disabled = true; gateErr.textContent = 'Opening…';
  try { await redeemKeyAndSignIn(bookId, 'viewer', key); }
  catch(e){ gateErr.textContent = authErr(e); enterBtn.disabled = false; }
}
enterBtn.addEventListener('click', tryEnter);
keyInput.addEventListener('keydown', e=>{ if(e.key==='Enter') tryEnter(); });

watchAuth(async (user)=>{
  if (!user || user.isAnonymous || opened) return;
  // a non-anonymous user is a redeemed token — but it must be for THIS book,
  // otherwise a leftover session from another book would skip the key.
  let claims = {};
  try { claims = (await user.getIdTokenResult()).claims; } catch(e){}
  if (claims.bookId !== bookId) return; // not this book → keep showing the key gate
  opened = true;
  try { priv = await getPrivateContent(bookId); } catch(e){ priv = {}; }
  document.getElementById('gate').hidden = true;
  document.getElementById('bookStage').hidden = false;
  document.getElementById('musicBtn').hidden = false;
  listenPages(bookId, list=>{ friends=list; buildPages(); renderPage(true); }, ()=>{});
});

document.getElementById('musicBtn').addEventListener('click', ()=>{
  musicOn = toggleMusic(!musicOn);
  document.getElementById('musicBtn').textContent = musicOn ? '♪ Music off' : '♪ Music';
});

// ---------- build pages ----------
// cover symbol: a flower, the major emblem, or nothing
const motif = (size)=>{
  if (cfg.coverSymbol === 'emblem') return emblemSVG(cfg.emblem || 'cap', { size, color: cfg.flowerColor });
  if (cfg.coverSymbol === 'none') return '';
  return flowerSVG(cfg.flower, { size, color: cfg.flowerColor });
};
function wrap(cls, html){ return `<div class="page ${cls}" style="width:100%;display:flex;flex-direction:column;align-items:center;justify-content:safe center;flex:1;">${html}</div>`; }
const scriptClass = ()=> cfg.nameScript==='arabic' ? 'arabic' : 'latin';

function coverPage(){ const m = motif(130); return wrap('cover', `
  ${m ? `<div class="cap-flower" style="width:clamp(90px,22vw,140px);margin:0 auto 1rem">${m}</div>` : ''}
  <div class="cover-name ${scriptClass()} ${cfg.nameScript==='arabic'?'gold-text':''}">${escapeHTML(cfg.recipientName)}</div>
  ${cfg.major ? `<div class="cover-major">${escapeHTML(cfg.major)}</div>` : ''}
  <div class="classof"><div class="smallcaps" style="color:var(--gold-deep);font-size:.9rem">Class of</div>
    <div class="yr" style="font-family:var(--serif);font-size:3rem;color:var(--gold-deep)">${escapeHTML(cfg.year||'')}</div></div>
  <div class="open-hint" style="margin-top:1.6rem;font-family:var(--serif);font-style:italic;color:var(--ink-soft)">tap to open</div>`); }

function dedicationPage(){ const text = priv.dedication || ''; return wrap('dedication', `
  <div class="ded-reveal ${scriptClass()}" id="dedName">${escapeHTML(cfg.recipientName)}</div>
  ${text ? `<p class="dedication-text" style="opacity:1">${escapeHTML(text).replace(/\n/g,'<br>')}</p>` : ''}`); }

function platePage(){
  const note = priv.plateNote || '';
  const m = motif(240);
  const isFlower = cfg.coverSymbol !== 'emblem' && cfg.coverSymbol !== 'none';
  const lore = isFlower ? FLOWER_LORE[cfg.flower] : null;
  const label = (isFlower && FLOWERS[cfg.flower]) ? FLOWERS[cfg.flower].label : '';
  return wrap('plate', `
  ${m ? `<div class="bloom" style="width:clamp(160px,40vw,240px)">${m}</div>` : ''}
  ${lore ? `
    <div class="binomial latin-binomial">${label} — <em>${lore.binomial}</em></div>
    <div class="common">${escapeHTML(lore.meaning)}</div>
    <p class="note">${escapeHTML(lore.line)}</p>`
  : (note ? `<p class="note" style="font-family:var(--body);color:var(--ink-soft);max-width:38ch;margin:1.2rem auto 0;line-height:1.7;font-style:italic">${escapeHTML(note)}</p>` : `<div class="rule"></div>`)}`); }

function thenNowPage(){
  const card = (src, label, cap) => !src ? '' : `
    <figure class="tn-card">
      <div class="polaroid"><span class="tape tape-l"></span><span class="tape tape-r"></span>
        <img src="${src}" alt="">${cap?`<figcaption>${escapeHTML(cap)}</figcaption>`:''}</div>
      <figcaption class="tn-label">${label}</figcaption>
    </figure>`;
  const both = priv.thenPhotoURL && priv.nowPhotoURL;
  return wrap('then', `
    <h2 class="gold-text" style="font-family:var(--serif);font-weight:600;font-size:clamp(1.6rem,5vw,2.2rem);margin-bottom:1.2rem">${both ? 'Then &amp; now' : 'A photo for you'}</h2>
    <div class="tn-row">${card(priv.thenPhotoURL,'Then',priv.thenCaption)}${card(priv.nowPhotoURL,'Now',priv.nowCaption)}</div>`);
}

function dividerPage(){ return wrap('divider', `
  <h2 class="gold-text" style="font-family:var(--serif);font-weight:600;font-size:clamp(1.7rem,5vw,2.4rem)">Pages from friends</h2>
  <p class="sub" style="font-family:var(--serif);font-style:italic;color:var(--ink-soft);max-width:36ch">Collected from near and far, pressed here for you.</p>`); }

function emptyPage(){ return wrap('divider', `
  <p class="empty-note" style="font-family:var(--serif);font-style:italic;color:var(--ink-soft);max-width:34ch;line-height:1.7">The first page is waiting. As friends leave their notes, they'll bloom here.</p>`); }

function friendPage(f, i){
  let html = specimenPageHTML({ name:f.name, message:f.message, photoSrc:f.photoURL||null, voiceSrc:f.voiceURL||null });
  html = html.replace('<span class="spec-label">No.</span>', `<span class="spec-label">No. ${i+1}</span>`);
  return wrap('friend', html);
}
function closingPage(){ const c = priv.closing || 'Wherever they are, they were all here for you. Congratulations.'; const m = motif(96); return wrap('closing', `
  ${m ? `<div class="mark" style="width:96px;margin:0 auto 1rem">${m}</div>` : ''}
  <p style="font-family:var(--serif);font-style:italic;font-size:clamp(1.3rem,3.4vw,1.7rem);color:var(--ink);max-width:32ch;line-height:1.8">${escapeHTML(c)}</p>`); }

function buildPages(){
  pages = [coverPage, dedicationPage, platePage];
  if (priv.thenPhotoURL || priv.nowPhotoURL) pages.push(thenNowPage);
  pages.push(dividerPage);
  if (friends.length===0) pages.push(emptyPage);
  else friends.forEach((f,i)=>pages.push(()=>friendPage(f,i)));
  pages.push(closingPage);
  if (cur>=pages.length) cur=pages.length-1;
}

// ---------- render + flip ----------
function renderPage(){
  const inner = document.getElementById('leafInner');
  inner.innerHTML = pages[cur]();
  const pc = document.getElementById('pageCount');
  pc.textContent = cur===0 ? '' : `Page ${cur} of ${pages.length-1}`;
  document.getElementById('prevBtn').disabled = (cur===0);
  document.getElementById('nextBtn').disabled = (cur===pages.length-1);
  const dn = inner.querySelector('#dedName'); if (dn) requestAnimationFrame(()=>dn.classList.add('run'));
  wireVoice(inner);
  const cover = inner.querySelector('.cover'); if (cover) cover.addEventListener('click', ()=>go(1,1));
}
function go(idx, dir){
  if (turning || idx<0 || idx>=pages.length) return;
  dir = dir || (idx>cur?1:-1); turning = true;
  const leaf=document.getElementById('leaf'), shade=document.getElementById('shade');
  const outDeg = dir>0 ? -92 : 92, inDeg = -outDeg;
  leaf.style.transformOrigin = dir>0 ? 'left center' : 'right center';
  leaf.style.transition='transform .5s cubic-bezier(.4,.05,.6,1)'; leaf.style.transform=`rotateY(${outDeg}deg)`; shade.style.opacity='0.85';
  setTimeout(()=>{ cur=idx; renderPage();
    leaf.style.transition='none'; leaf.style.transform=`rotateY(${inDeg}deg)`; shade.style.opacity='0';
    void leaf.offsetWidth; leaf.style.transition='transform .5s cubic-bezier(.4,.05,.6,1)'; leaf.style.transform='rotateY(0deg)';
    setTimeout(()=>{ turning=false; }, 510);
  }, 510);
}
document.getElementById('nextBtn').addEventListener('click', ()=>go(cur+1,1));
document.getElementById('prevBtn').addEventListener('click', ()=>go(cur-1,-1));
document.addEventListener('keydown', e=>{ if(document.getElementById('bookStage').hidden) return;
  if(e.key==='ArrowRight') go(cur+1,1); if(e.key==='ArrowLeft') go(cur-1,-1); });
let tx=0;
const bs=document.getElementById('bookStage');
bs.addEventListener('touchstart', e=>tx=e.touches[0].clientX, {passive:true});
bs.addEventListener('touchend', e=>{ const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)<50) return; if(dx<0) go(cur+1,1); else go(cur-1,-1); });
</script>
</body>
</html>
